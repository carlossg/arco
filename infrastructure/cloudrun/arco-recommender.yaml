apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: arco-recommender
  labels:
    app: arco
    component: recommender
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: arco-recommender-sa
      containerConcurrency: 80
      timeoutSeconds: 3600
      containers:
        - image: gcr.io/PROJECT_ID/arco-recommender:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "8080"
            - name: GCP_PROJECT_ID
              value: PROJECT_ID
            - name: GCP_LOCATION
              value: us-central1
            - name: MODEL_PRESET
              value: production
            - name: DA_ORG
              value: carlossg
            - name: DA_REPO
              value: arco
            - name: DA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: DA_TOKEN
                  key: latest
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
