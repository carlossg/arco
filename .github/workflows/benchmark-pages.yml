name: Benchmark Report Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout arco-benchmark
        uses: actions/checkout@v4
        with:
          repository: Adobe-AEM-Foundation/arco-benchmark
          path: arco-benchmark

      - name: Assemble pages artifact
        run: |
          mkdir -p _site/benchmark
          cp arco-benchmark/index.html _site/benchmark/
          cp arco-benchmark/results/classification.json _site/benchmark/
          cp arco-benchmark/results/reasoning.json _site/benchmark/
          # Redirect root to benchmark report
          echo '<meta http-equiv="refresh" content="0; url=benchmark/">' > _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deployment
