      apiKeyEnvar: CLOUDFLARE_API_TOKEN

  - id: "openai:@cf/meta/llama-3.3-70b-instruct-fp8-fast"
    label: cloudflare/llama-3.3-70b
    config:
      apiBaseUrl: "https://api.cloudflare.com/client/v4/accounts/{{env.CLOUDFLARE_ACCOUNT_ID}}/ai/v1"
      apiKeyEnvar: CLOUDFLARE_API_TOKEN

  - id: "openai:@cf/mistralai/mistral-small-3.1-24b-instruct"
    label: cloudflare/mistral-small-3.1
    config:
      apiBaseUrl: "https://api.cloudflare.com/client/v4/accounts/{{env.CLOUDFLARE_ACCOUNT_ID}}/ai/v1"
      apiKeyEnvar: CLOUDFLARE_API_TOKEN

  - id: "openai:@cf/qwen/qwq-32b"
    label: cloudflare/qwq-32b
    config:
      apiBaseUrl: "https://api.cloudflare.com/client/v4/accounts/{{env.CLOUDFLARE_ACCOUNT_ID}}/ai/v1"
      apiKeyEnvar: CLOUDFLARE_API_TOKEN

  - id: "openai:@cf/deepseek-ai/deepseek-r1-distill-qwen-32b"
