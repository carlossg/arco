      apiKeyEnvar: GCLOUD_TOKEN

  - id: vertex:llama-3.3-70b-instruct-maas
    label: vertex/llama-3.3-70b

  - id: vertex:llama-3.1-70b-instruct-maas
    label: vertex/llama-3.1-70b

  # ── Google Vertex AI — Gemma ─────────────────────────────────────────────────
